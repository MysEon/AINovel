# Schemathesis v4 配置文件
# 用于控制契约测试的全局行为

[generation]
max-examples = 50

[phases]
enabled = true

[phases.examples]
enabled = true

[phases.coverage]
enabled = true

[phases.fuzzing]
enabled = false

[phases.stateful]
enabled = false

# 跳过 SSE / stream 端点：EventSourceResponse / StreamingResponse 不适合普通 HTTP 测试
[[operations]]
include-path = "/api/v1/ai/runs/{run_id}/stream"
enabled = false

[[operations]]
include-path = "/api/v1/ai/runs/{run_id}/start-stream"
enabled = false

[[operations]]
include-path = "/api/ai/chat-stream"
enabled = false

# 跳过 Admin 端点：需要 superuser 权限
[[operations]]
include-path = "/api/v1/admin/keys/rotate"
enabled = false

# 跳过 health diag：仅 dev 环境开放，响应随环境变化
[[operations]]
include-path = "/health/diag"
enabled = false

# 禁用三类预期内的 Schemathesis 检查噪音：
# - status_code_conformance: 随机 ID 请求返回 404 是预期行为，schema 未声明 404 属于正常
# - unsupported_method: FastAPI 路由匹配机制导致 422 而非 405，是框架预期行为
# - positive_data_acceptance: Schemathesis 生成 null 值触发 FastAPI 校验 422，属于生成器限制
[checks]
status_code_conformance = { enabled = false }
unsupported_method = { enabled = false }
positive_data_acceptance = { enabled = false }
